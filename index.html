<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>VaultX</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell hidden" aria-live="polite">
      <header class="topbar glass">
        <div>
          <h1 id="page-title">VaultX</h1>
          <p class="subtitle">Secure offline-first vault</p>
        </div>
        <div class="indicators">
          <span id="network-indicator" class="pill offline">Offline</span>
          <span id="sync-indicator" class="pill">Idle</span>
        </div>
      </header>

      <main id="content" class="content"></main>

      <button id="fab" class="fab" aria-label="Add item">+</button>

      <nav class="bottom-nav glass" aria-label="Vault sections">
        <button data-tab="password" class="active">🔐<span>Passwords</span></button>
        <button data-tab="file">📁<span>Files</span></button>
        <button data-tab="dev">🧠<span>Dev</span></button>
        <button data-tab="settings">⚙️<span>Settings</span></button>
      </nav>
    </div>

    <div id="lock-screen" class="lock-screen">
      <div class="lock-card glass">
        <h2>VaultX</h2>
        <p id="lock-label">Enter PIN</p>
        <div id="pin-dots" class="pin-dots" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div id="pin-pad" class="pin-pad"></div>
      </div>
    </div>

    <div id="secret-lock-screen" class="lock-screen hidden">
      <div class="lock-card glass">
        <h2>Secret Vault</h2>
        <p id="secret-lock-label">Enter secret PIN</p>
        <div id="secret-pin-dots" class="pin-dots" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div id="secret-pin-pad" class="pin-pad"></div>
      </div>
    </div>

    <dialog id="item-modal" class="modal">
      <form id="item-form" method="dialog" class="modal-body glass"></form>
    </dialog>

    <template id="about-template">
      <section class="card glass">
        <h3>About</h3>
        <p>Developed by Maviya Attar</p>
      </section>
    </template>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
